<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>V Points</title>
  <style>
    :root {
      font-family: Georgia, "Times New Roman", serif;
      color: #1e1d1a;
      background:
        radial-gradient(circle at top, rgba(255, 245, 214, 0.95), transparent 35%),
        linear-gradient(180deg, #f3ead6 0%, #dcc6a0 100%);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    main {
      width: min(100%, 40rem);
      background: rgba(255, 252, 244, 0.9);
      border: 1px solid rgba(86, 61, 32, 0.18);
      border-radius: 1.5rem;
      box-shadow: 0 1.5rem 3rem rgba(71, 47, 20, 0.15);
      padding: 1.5rem;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    .hero {
      display: grid;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .label {
      font-size: 0.85rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #7a5a31;
    }

    .total {
      font-size: clamp(3rem, 10vw, 5rem);
      font-weight: 700;
      line-height: 1;
      color: #2f2418;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 0.85rem 0.9rem;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      color: #fffaf0;
      background: linear-gradient(180deg, #8b5e34 0%, #6f4721 100%);
      box-shadow: 0 0.7rem 1.3rem rgba(111, 71, 33, 0.22);
      transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
    }

    button:hover,
    button:active {
      transform: translateY(-1px);
      box-shadow: 0 0.95rem 1.5rem rgba(111, 71, 33, 0.28);
      filter: brightness(1.02);
    }

    button:focus-visible {
      outline: 3px solid #c98e3d;
      outline-offset: 3px;
    }

    .attempt {
      background: linear-gradient(180deg, #476c61 0%, #2f5047 100%);
      box-shadow: 0 0.7rem 1.3rem rgba(47, 80, 71, 0.22);
    }

    .clear {
      margin-bottom: 1.25rem;
      background: transparent;
      color: #6d4a24;
      border: 1px solid rgba(109, 74, 36, 0.24);
      box-shadow: none;
    }

    .clear:hover,
    .clear:active {
      box-shadow: none;
    }

    .log-panel {
      background: rgba(255, 248, 235, 0.9);
      border-radius: 1.1rem;
      padding: 1rem;
      border: 1px solid rgba(86, 61, 32, 0.12);
    }

    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 0.85rem;
    }

    .log-header h2 {
      font-size: 1.2rem;
    }

    #action-log {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 0.65rem;
    }

    #action-log li {
      padding: 0.8rem 1rem;
      border-radius: 0.9rem;
      background: #fffdf8;
      border: 1px solid rgba(111, 71, 33, 0.12);
      font-weight: 700;
      color: #49331a;
    }

    .empty {
      color: #7a684f;
      font-style: italic;
    }

    @media (max-width: 36rem) {
      .controls {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-labelledby="page-title">
      <p class="label">Climbing Volume</p>
      <h1 id="page-title">V Points</h1>
      <p class="total" id="total-points" aria-live="polite">0</p>
    </section>

    <section class="controls" aria-label="Scoring buttons">
      <button type="button" data-action="V3">V3</button>
      <button type="button" data-action="V4">V4</button>
      <button type="button" data-action="V5">V5</button>
      <button type="button" data-action="V6">V6</button>
      <button type="button" data-action="V7">V7</button>
      <button type="button" data-action="V8">V8</button>
      <button type="button" data-action="V9">V9</button>
      <button type="button" class="attempt" data-action="Attempt">Attempt</button>
    </section>

    <button type="button" class="clear" id="clear-log">Clear</button>

    <section class="log-panel" aria-labelledby="log-title">
      <div class="log-header">
        <h2 id="log-title">Actions</h2>
        <span class="label">Newest First</span>
      </div>
      <p class="empty" id="empty-state">No actions yet.</p>
      <ol id="action-log"></ol>
    </section>
  </main>

  <script type="module">
    import { setupApp } from './app.js';

    setupApp();
  </script>
</body>
</html>
